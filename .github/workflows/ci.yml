name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Primary: lint, typecheck, unit tests, build ───────────────────────────
  build-test-lint:
    name: build-test-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: Test
        run: pnpm -r --if-present run test --run

      - name: Build
        run: pnpm -r --if-present run build

      - name: Bundle size gate
        run: pnpm --filter lexio-web size:check

      # Coverage upload — informational, non-blocking
      - name: Coverage report
        run: pnpm --filter lexio-web coverage
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/lexio-web/coverage
          retention-days: 7

  # ── E2E: Playwright happy-path ────────────────────────────────────────────
  e2e:
    name: e2e
    needs: build-test-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter lexio-web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter lexio-web e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/lexio-web/playwright-report
          retention-days: 7

  # ── Lighthouse CI: perf + a11y gates ─────────────────────────────────────
  lighthouse:
    name: lighthouse
    needs: build-test-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter lexio-web build

      - name: Run Lighthouse CI
        run: pnpm --filter lexio-web lighthouse
        # Non-blocking for prototype: thresholds are warn-level, not error.
        # Flip to required: true when production targets are hit.
        continue-on-error: true
